<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Legaspace</title>

    <style>
        :root {
            --primary: #0d1b2a;
            --secondary: #1b263b;
            --accent: #fca311;
            --text-muted: #88929b;
            --error-bg: #fff1f0;
            --error-text: #d93025;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Subtle background pattern for Admin feel */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(13, 27, 42, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(252, 163, 17, 0.03) 0%, transparent 50%);
            z-index: -1;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border-top: 5px solid var(--primary);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-weight: 900;
            font-size: 26px;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        h2 {
            font-size: 22px;
            color: var(--secondary);
            margin-bottom: 25px;
            text-align: center;
        }

        /* --- ALERT --- */
        .error-alert {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #ffa39e;
        }

        /* --- FORM --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            padding-left: 2px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 10px;
            font-size: 15px;
            background: #fafafa;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(252, 163, 17, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(13, 27, 42, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }

        /* Responsive padding adjustment */
        @media (max-width: 450px) {
            .login-card {
                padding: 40px 25px;
                margin: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="header">
            <div class="logo">LEGASPACE</div>
            <div class="subtitle">Secure Admin Panel</div>
        </div>

        <h2>Administrator Sign In</h2>

        {% if error %}
            <div class="error-alert">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" name="email" placeholder="email@legaspace.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Access Dashboard</button>
        </form>

        <div class="footer-note">
            &copy; 2026 Legaspace Management System. <br>
            Restricted access only.
        </div>
    </div>

</body>
</html>
