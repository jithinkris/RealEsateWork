<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Installment | Legaspace Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0d1b2a;
            --secondary: #1b263b;
            --accent: #27ae60; /* Professional Green for money/payments */
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .payment-card {
            background: var(--white);
            width: 100%;
            max-width: 480px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .card-header {
            background-color: #f8fafc;
            padding: 30px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        .property-tag {
            display: inline-block;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: #fff;
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
            font-weight: 500;
        }

        .property-tag strong {
            color: var(--primary);
        }

        .form-content {
            padding: 35px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .currency-symbol {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-weight: 600;
            pointer-events: none;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            background-color: #ffffff;
            outline: none;
        }

        input {
            padding-left: 35px; /* Space for ₹ */
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(39, 174, 96, 0.2);
        }

        button:hover {
            background-color: #219150;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(39, 174, 96, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-back {
            text-decoration: none;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid transparent;
        }

        .btn-back:hover {
            color: var(--primary);
            background: #f1f5f9;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .payment-card {
                border-radius: 15px;
            }
            .form-content {
                padding: 25px;
            }
            h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="card-header">
        <h2>Add Installment</h2>
        <span class="property-tag"><strong>Property:</strong> {{ sale.property.title }}</span>
    </div>

    <div class="form-content">
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="amount">Payment Amount</label>
                <div class="input-wrapper">
                    <span class="currency-symbol">₹</span>
                    <input type="number" name="amount" id="amount" placeholder="0.00" step="0.01" required>
                </div>
            </div>

            <div class="form-group">
                <label for="payment_method">Payment Method</label>
                <select name="payment_method" id="payment_method" required>
                    <option value="" disabled selected>Select method...</option>
                    <option value="cash">💵 Cash Payment</option>
                    <option value="upi">📱 UPI / QR Scan</option>
                    <option value="bank">🏦 Bank Transfer (NEFT/IMPS)</option>
                    <option value="cheque">✍️ Cheque</option>
                </select>
            </div>

            <div class="actions">
                <button type="submit">Record Payment</button>
                <a href="javascript:history.back()" class="btn-back">Cancel and go back</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
