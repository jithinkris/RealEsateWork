<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Installment</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60; /* Green for payments */
            --bg-color: #f4f7f6;
            --border-color: #dcdde1;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .payment-card {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .card-header {
            background-color: #f8fbf9;
            padding: 25px;
            border-bottom: 1px solid #edf2f0;
            text-align: center;
        }

        h2 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--primary-color);
            font-weight: 600;
        }

        .property-tag {
            display: inline-block;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #7f8c8d;
            background: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .form-content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #57606f;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper span {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #a4b0be;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            padding-left: 30px; /* Space for ₹ symbol */
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        select {
            padding-left: 15px; /* Select doesn't need ₹ symbol */
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23a4b0be' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #219150;
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            font-size: 0.95rem;
            color: #2c3e50;
            border: 1px solid #dcdde1;
            margin-top: 20px;
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
        }

        .btn-action:hover {
            transform: translateY(-1px);
            background-color: #f0f4f8;
        }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="card-header">
        <h2>Add Installment</h2>
        <span class="property-tag"><strong>Property:</strong> {{ sale.property.title }}</span>
    </div>

    <div class="form-content">
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="amount">Payment Amount</label>
                <div class="input-wrapper">
                    <span>₹</span>
                    <input type="number" name="amount" id="amount" placeholder="0.00" required>
                </div>
            </div>

            <div class="form-group">
                <label for="payment_method">Payment Method</label>
                <select name="payment_method" id="payment_method">
                    <option value="cash">Cash</option>
                    <option value="upi">UPI / QR Scan</option>
                    <option value="bank">Bank Transfer (NEFT/IMPS)</option>
                </select>
            </div>

            <button type="submit">Record Payment</button>
            <a href="javascript:history.back()" class="btn-action">Cancel and go back</a>
        </form>
    </div>
</div>

</body>
</html>
