<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Sold Property | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d1b2a;
            --secondary: #1b263b;
            --accent: #fca311;
            --bg: #f0f2f5;
            --white: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --error: #e74c3c;
            --success: #2ecc71;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Responsive Container */
        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }

        .back-link {
            display: inline-block;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 15px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        /* Form Card Styling */
        .form-card {
            background: var(--white);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(13, 27, 42, 0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 700;
            color: var(--primary);
            font-size: 1.6rem;
            letter-spacing: -0.5px;
        }

        /* Input Styling */
        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--secondary);
        }

        select, input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #edf2f7;
            border-radius: 10px;
            background-color: #f8fafc;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(252, 163, 17, 0.1);
        }

        /* Responsive Grid for numeric fields */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .helper-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Error Message */
        .error-box {
            background-color: #fff5f5;
            color: var(--error);
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--error);
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Button Styling */
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, background-color 0.2s;
        }

        button:hover {
            background-color: var(--secondary);
            box-shadow: 0 4px 12px rgba(27, 38, 59, 0.2);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Responsive Mobile Adjustments */
        @media (max-width: 480px) {
            .form-card {
                padding: 20px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/admin/dashboard/" class="back-link">← Back to Dashboard</a>

    <div class="form-card">
        <h2>Record New Sale</h2>

        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="property">Property Title</label>
                <select name="property" id="property" required>
                    <option value="" disabled selected>Search & select property...</option>
                    {% for p in properties %}
                        <option value="{{ p.id }}">{{ p.title }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="buyer">Select Buyer</label>
                <select name="buyer" id="buyer">
                    <option value="" selected>Choose existing buyer or select other</option>
                    {% for u in users %}
                        <option value="{{ u.id }}">{{ u.name }}</option>
                    {% endfor %}
                    <option value="other">Unregistered buyer (Manual Entry)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="buyer_name">Buyer Name (Manual Entry)</label>
                <input type="text" name="buyer_name" id="buyer_name" placeholder="Full name of unregistered buyer">
                <p class="helper-text">Only use this if the buyer is not in the registered list above.</p>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="total_price">Total Sale Price (₹)</label>
                    <input type="number" name="total_price" id="total_price" placeholder="5,000,000" required>
                </div>

                <div class="form-group">
                    <label for="advance_paid">Advance (₹)</label>
                    <input type="number" name="advance_paid" id="advance_paid" placeholder="500,000" required>
                </div>
            </div>

            <button type="submit">Complete Sale Entry</button>
        </form>
    </div>
</div>

</body>
</html>
