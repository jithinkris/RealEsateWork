<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Property | Legaspace Admin</title>

    <style>
        :root {
            --primary: #0d1b2a;
            --secondary: #1b263b;
            --accent: #fca311;
            --bg: #f4f7f6;
            --white: #ffffff;
            --border: #dcdfe6;
            --danger: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--primary);
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        header {
            border-bottom: 2px solid var(--bg);
            margin-bottom: 30px;
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 { font-size: 1.8rem; color: var(--primary); }

        .back-link {
            text-decoration: none;
            color: #666;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* --- FORM GRID --- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--secondary);
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            background: #fafafa;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(252, 163, 17, 0.1);
        }

        textarea { resize: vertical; min-height: 120px; }

        /* --- AMENITIES --- */
        .checkbox-group {
            display: flex;
            gap: 30px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        /* --- IMAGE MANAGEMENT --- */
        .image-manager {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }

        .image-thumb {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
            height: 100px;
        }

        .image-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .delete-overlay {
            position: absolute;
            top: 5px; right: 5px;
            background: var(--danger);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            text-decoration: none;
            font-weight: bold;
            opacity: 0.9;
        }

        .file-upload {
            border: 2px dashed var(--border);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            background: #fdfdfd;
            margin-top: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
        }

        .submit-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>

<body>

<div class="container">
    <header>
        <h2>Edit Property</h2>
        <a href="/admin/properties/" class="back-link">&larr; Cancel & Return</a>
    </header>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group full-width">
                <label>Property Title</label>
                <input type="text" name="title" value="{{ property.title }}" required>
            </div>

            <div class="form-group">
                <label>Property Type</label>
                <select name="property_type">
                    <option value="apartment" {% if property.property_type == 'apartment' %}selected{% endif %}>Apartment</option>
                    <option value="villa" {% if property.property_type == 'villa' %}selected{% endif %}>Villa</option>
                    <option value="plot" {% if property.property_type == 'plot' %}selected{% endif %}>Plot / Land</option>
                    <option value="commercial" {% if property.property_type == 'commercial' %}selected{% endif %}>Commercial</option>
                </select>
            </div>

            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" name="price" value="{{ property.price }}" >
            </div>

            <div class="form-group full-width">
                <label>Location</label>
                <input type="text" name="location" value="{{ property.location }}" required>
            </div>

            <div class="form-group full-width">
                <label>Description</label>
                <textarea name="description">{{ property.description }}</textarea>
            </div>

            <div class="form-group">
                <label>Area (sq ft)</label>
                <input type="number" name="area" value="{{ property.area }}">
            </div>

            <div class="form-group">
                <label>Current Status</label>
                <select name="status">
                    <option value="available" {% if property.status == 'available' %}selected{% endif %}>Available</option>
                    <option value="sold" {% if property.status == 'sold' %}selected{% endif %}>Sold</option>
                    <option value="upcoming" {% if property.status == 'upcoming' %}selected{% endif %}>Upcoming</option>
                </select>
            </div>

            <div class="form-group">
                <label>Bedrooms</label>
                <input type="number" name="bedrooms" value="{{ property.bedrooms }}">
            </div>

            <div class="form-group">
                <label>Bathrooms</label>
                <input type="number" name="bathrooms" value="{{ property.bathrooms }}">
            </div>
        </div>

        <label>Amenities</label>
        <div class="checkbox-group">
            <label class="checkbox-item">
                <input type="checkbox" name="parking" {% if property.parking %}checked{% endif %}> Parking
            </label>
            <label class="checkbox-item">
                <input type="checkbox" name="furnished" {% if property.furnished %}checked{% endif %}> Furnished
            </label>
        </div>

        <div class="image-manager">
            <label>Existing Property Photos</label>
            <div class="image-grid">
                {% for img in property.images.all %}
                <div class="image-thumb">
                    <img src="{{ img.image.url }}">
                    <a href="/admin/delete-image/{{ img.id }}/" class="delete-overlay" onclick="return confirm('Remove this image?')">Remove</a>
                </div>
                {% empty %}
                <p style="font-size: 0.85rem; color: #999;">No images uploaded.</p>
                {% endfor %}
            </div>

            <label style="margin-top: 20px;">Upload New Photos</label>
            <div class="file-upload">
                <input type="file" name="images" multiple>
            </div>
        </div>

        <button type="submit" class="submit-btn">Save Changes</button>
    </form>
</div>

</body>
</html>
