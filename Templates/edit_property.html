<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Property | Legaspace Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0d1b2a;
            --secondary: #1b263b;
            --accent: #fca311;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --danger: #ef4444;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            margin: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        h2 { 
            font-size: 1.75rem; 
            font-weight: 700; 
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .back-link:hover { color: var(--accent); }

        /* --- FORM GRID --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .full-width { grid-column: span 2; }

        .form-group { position: relative; }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            background: #ffffff;
            color: var(--text-main);
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(252, 163, 17, 0.1);
        }

        textarea { resize: vertical; min-height: 120px; }

        /* --- AMENITIES --- */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        /* --- IMAGE MANAGEMENT --- */
        .image-manager {
            margin-top: 30px;
            padding: 25px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .image-thumb {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 1/1;
            border: 2px solid white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .image-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .delete-overlay {
            position: absolute;
            top: 5px; right: 5px;
            background: var(--danger);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
        }

        .file-upload {
            border: 2px dashed var(--border);
            padding: 30px;
            text-align: center;
            border-radius: 12px;
            background: white;
            margin-top: 20px;
            cursor: pointer;
        }

        .file-upload:hover { border-color: var(--accent); }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(13, 27, 42, 0.2);
        }

        @media (max-width: 768px) {
            .container { padding: 25px; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>

<body>

<div class="container">
    <header>
        <h2>Edit Property</h2>
        <a href="/admin/properties/" class="back-link">← Cancel & Return</a>
    </header>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group full-width">
                <label>Property Title</label>
                <input type="text" name="title" value="{{ property.title }}" required>
            </div>

            <div class="form-group">
                <label>Property Type</label>
                <select name="property_type">
                    <option value="apartment" {% if property.property_type == 'apartment' %}selected{% endif %}>Apartment</option>
                    <option value="villa" {% if property.property_type == 'villa' %}selected{% endif %}>Villa</option>
                    <option value="plot" {% if property.property_type == 'plot' %}selected{% endif %}>Plot / Land</option>
                    <option value="commercial" {% if property.property_type == 'commercial' %}selected{% endif %}>Commercial</option>
                </select>
            </div>

            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" name="price" value="{{ property.price }}">
            </div>

            <div class="form-group full-width">
                <label>Location</label>
                <input type="text" name="location" value="{{ property.location }}" required>
            </div>

            <div class="form-group full-width">
                <label>Description</label>
                <textarea name="description">{{ property.description }}</textarea>
            </div>

            <div class="form-group">
                <label>Area (sq ft)</label>
                <input type="number" name="area" value="{{ property.area }}">
            </div>

            <div class="form-group">
                <label>Current Status</label>
                <select name="status">
                    <option value="available" {% if property.status == 'available' %}selected{% endif %}>Available</option>
                    <option value="sold" {% if property.status == 'sold' %}selected{% endif %}>Sold</option>
                    <option value="upcoming" {% if property.status == 'upcoming' %}selected{% endif %}>Upcoming</option>
                </select>
            </div>

            <div class="form-group">
                <label>Bedrooms</label>
                <input type="number" name="bedrooms" value="{{ property.bedrooms }}">
            </div>

            <div class="form-group">
                <label>Bathrooms</label>
                <input type="number" name="bathrooms" value="{{ property.bathrooms }}">
            </div>
        </div>

        <label style="margin-top: 20px; display: block;">Amenities</label>
        <div class="checkbox-group">
            <label class="checkbox-item">
                <input type="checkbox" name="parking" {% if property.parking %}checked{% endif %}> Parking
            </label>
            <label class="checkbox-item">
                <input type="checkbox" name="furnished" {% if property.furnished %}checked{% endif %}> Furnished
            </label>
        </div>

        <div class="image-manager">
            <label>Manage Property Photos</label>
            <div class="image-grid">
                {% for img in property.images.all %}
                <div class="image-thumb">
                    <img src="{{ img.image.url }}">
                    <a href="/admin/delete-image/{{ img.id }}/" class="delete-overlay" onclick="return confirm('Permanently remove this photo?')">Remove</a>
                </div>
                {% empty %}
                <p style="font-size: 0.85rem; color: var(--text-muted); grid-column: 1/-1;">No images found for this property.</p>
                {% endfor %}
            </div>

            <label style="margin-top: 25px; display: block;">Add More Photos</label>
            <div class="file-upload">
                <input type="file" name="images" multiple id="file-input">
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 8px;">Click or drag files here to upload</p>
            </div>
        </div>

        <button type="submit" class="submit-btn">Update Property</button>
    </form>
</div>

</body>
</html>
