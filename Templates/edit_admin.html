<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | Legaspace Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0d1b2a;
            --secondary: #1b263b;
            --accent: #fca311;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        h2 { 
            font-size: 1.75rem; 
            font-weight: 700; 
            color: var(--primary); 
            letter-spacing: -0.5px;
            margin-bottom: 8px; 
        }

        .subtitle { 
            color: var(--text-muted); 
            font-size: 0.95rem; 
        }

        /* --- ALERTS --- */
        .alert {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            text-align: center;
            font-weight: 600;
        }
        .alert-error { 
            background: #fef2f2; 
            color: var(--danger); 
            border: 1px solid #fee2e2; 
        }
        .alert-success { 
            background: #ecfdf5; 
            color: var(--success); 
            border: 1px solid #d1fae5; 
        }

        /* --- FORM --- */
        .form-group { margin-bottom: 22px; }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            background: #ffffff;
            color: var(--text-main);
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(252, 163, 17, 0.1);
        }

        /* Security Box */
        .section-divider {
            margin: 30px 0;
            padding: 25px;
            background: #f1f5f9;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .section-divider h3 {
            font-size: 0.9rem;
            margin-bottom: 18px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .submit-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(13, 27, 42, 0.2);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 25px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .back-home:hover { color: var(--primary); }

        /* Responsive */
        @media (max-width: 480px) {
            .profile-card {
                padding: 25px;
                border-radius: 15px;
            }
            h2 { font-size: 1.5rem; }
            .section-divider { padding: 15px; }
        }
    </style>
</head>

<body>

<div class="profile-card">
    <header>
        <h2>Account Settings</h2>
        <p class="subtitle">Update your profile and credentials</p>
    </header>

    {% if error %}
    <div class="alert alert-error">⚠️ {{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success">✅ {{ success }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" value="{{ admin.name }}" placeholder="Admin Name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" value="{{ admin.email }}" placeholder="admin@legaspace.com" required>
        </div>

        <div class="section-divider">
            <h3>🔐 Security Update</h3>
            
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="old_password" placeholder="Enter current password">
            </div>

            <div class="form-group" style="margin-bottom: 0;">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Leave blank to keep current">
            </div>
        </div>

        <button type="submit" class="submit-btn">Save Profile Changes</button>
        
        <a href="/admin/dashboard/" class="back-home">← Return to Dashboard</a>
    </form>
</div>

</body>
</html>
