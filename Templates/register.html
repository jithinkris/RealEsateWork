<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Legaspace</title>

    <style>
        :root {
            --primary: #0d1b2a;
            --secondary: #1b263b;
            --accent: #fca311;
            --bg-gradient: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Decoration background (Optional) */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40vh;
            background: var(--bg-gradient);
            z-index: -1;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .container h2 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .container p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        /* --- MESSAGES --- */
        .error, .success {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            text-align: center;
        }

        .error {
            background: #ffe5e5;
            color: #d93025;
            border: 1px solid #ffcccc;
        }

        .success {
            background: #e6ffed;
            color: #28a745;
            border: 1px solid #c6f6d5;
        }

        /* --- FORM STYLING --- */
        .form-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            background: #fcfcfc;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 4px rgba(252, 163, 17, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            color: var(--primary);
            font-size: 1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #e59400;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 148, 0, 0.3);
        }

        .footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }

        .footer-links a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Join Legaspace</h2>
    <p class="subtitle">Create an account to start your property journey</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if success %}
        <p class="success">{{ success }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <input type="text" name="name" placeholder="Full Name" required>
        </div>

        <div class="form-group">
            <input type="email" name="email" placeholder="Email Address" required>
        </div>

        <div class="form-group">
            <input type="text" name="phone" placeholder="Phone Number" required>
        </div>

        <div class="form-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="form-group">
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
        </div>

        <button type="submit">Create Account</button>
    </form>

    <div class="footer-links">
        Already have an account? <a href="/login/">Login here</a>
        <br><br>
        <a href="/" style="font-weight: normal; font-size: 0.8rem;">&larr; Back to Home</a>
    </div>
</div>

</body>
</html>
