<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads | {{ property.title }}</title>
    <style>
        :root {
            --primary: #0d1b2a;
            --secondary: #1b263b;
            --accent: #fca311;
            --bg: #f8f9fa;
            --white: #ffffff;
            --text-muted: #6c757d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--primary);
            padding: 40px 5%;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* --- HEADER --- */
        header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }

        .header-title h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .header-title p {
            color: var(--text-muted);
            font-weight: 500;
        }

        .back-link {
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* --- TABLE CARD --- */
        .lead-card {
            background: var(--white);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            background: #fdfdfd;
            border-bottom: 2px solid #eee;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        td {
            padding: 20px 15px;
            border-bottom: 1px solid #f1f1f1;
            font-size: 1rem;
        }

        .lead-name {
            font-weight: 700;
            color: var(--primary);
        }

        .lead-phone {
            color: var(--secondary);
            font-family: monospace;
            font-size: 1.1rem;
        }

        /* --- STATUS BADGES --- */
        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            text-transform: uppercase;
        }

        .status-waiting { background: #fff4e5; color: #d47e00; }
        .status-contacted { background: #e3f2fd; color: #1976d2; }
        .status-closed { background: #e8f5e9; color: #2e7d32; }

        .call-btn {
            text-decoration: none;
            color: var(--accent);
            font-weight: 700;
            font-size: 0.85rem;
            border: 1px solid var(--accent);
            padding: 5px 12px;
            border-radius: 6px;
        }

        .call-btn:hover {
            background: var(--accent);
            color: var(--primary);
        }

        @media (max-width: 600px) {
            header { flex-direction: column; align-items: flex-start; gap: 10px; }
            td, th { padding: 12px 10px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/admin/properties/" class="back-link">&larr; Back to Inventory</a>
    
    <header>
        <div class="header-title">
            <h2>Interested Leads</h2>
            <p>Property: <span style="color: var(--accent);">{{ property.title }}</span></p>
        </div>
        <div style="font-size: 0.9rem; font-weight: 600; color: var(--text-muted);">
            Total: {{ leads|length }}
        </div>
    </header>

    <div class="lead-card">
        <table>
            <thead>
                <tr>
                    <th>Customer</th>
                    <th>Contact Info</th>
                    <th>Status</th>
                    <th style="text-align: right;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for l in leads %}
                <tr>
                    <td>
                        <div class="lead-name">{{ l.name }}</div>
                    </td>
                    <td>
                        <span class="lead-phone">{{ l.phone }}</span>
                    </td>
                    <td>
                        <span class="badge status-{{ l.status }}">{{ l.status }}</span>
                    </td>
                    <td style="text-align: right;">
                        <a href="tel:{{ l.phone }}" class="call-btn">📞 Call Now</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" style="text-align: center; padding: 50px; color: var(--text-muted);">
                        No inquiries yet for this property.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
