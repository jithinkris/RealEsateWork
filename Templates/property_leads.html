<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads | {{ property.title }} | Legaspace Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0d1b2a;
            --secondary: #1b263b;
            --accent: #fca311;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* --- NAVIGATION --- */
        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .back-link:hover {
            color: var(--primary);
            transform: translateX(-3px);
        }

        /* --- HEADER --- */
        header {
            background: var(--white);
            padding: 25px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .header-title h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .header-title p {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .lead-count {
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--secondary);
            border: 1px solid var(--border);
        }

        /* --- TABLE CARD --- */
        .lead-card {
            background: var(--white);
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            text-align: left;
            padding: 16px 20px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .lead-name {
            font-weight: 700;
            color: var(--primary);
            font-size: 1rem;
        }

        .lead-phone {
            color: var(--text-muted);
            font-weight: 500;
            font-family: 'Courier New', Courier, monospace;
        }

        /* --- STATUS BADGES --- */
        .badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-waiting { background: #fff4e5; color: #d47e00; }
        .status-contacted { background: #e3f2fd; color: #1976d2; }
        .status-closed { background: #e8f5e9; color: #2e7d32; }

        /* --- CALL BUTTON --- */
        .call-btn {
            text-decoration: none;
            color: var(--primary);
            background: var(--accent);
            font-weight: 700;
            font-size: 0.8rem;
            padding: 10px 16px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(252, 163, 17, 0.2);
        }

        .call-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(252, 163, 17, 0.3);
            background: #e69500;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            header { flex-direction: column; align-items: flex-start; gap: 15px; padding: 20px; }
            .lead-count { align-self: flex-end; }
            td, th { padding: 15px; }
            .lead-name { font-size: 0.9rem; }
            .call-btn span { display: none; } /* Show only icon on very small screens */
            .call-btn { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/admin/properties/" class="back-link">← Back to Inventory</a>
    
    <header>
        <div class="header-title">
            <h2>Interested Leads</h2>
            <p>Target: <strong style="color: var(--primary);">{{ property.title }}</strong></p>
        </div>
        <div class="lead-count">
            {{ leads|length }} TOTAL INQUIRIES
        </div>
    </header>

    <div class="lead-card">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Contact Info</th>
                        <th>Status</th>
                        <th style="text-align: right;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for l in leads %}
                    <tr>
                        <td>
                            <div class="lead-name">{{ l.name }}</div>
                        </td>
                        <td>
                            <span class="lead-phone">{{ l.phone }}</span>
                        </td>
                        <td>
                            <span class="badge status-{{ l.status }}">{{ l.status }}</span>
                        </td>
                        <td style="text-align: right;">
                            <a href="tel:{{ l.phone }}" class="call-btn">
                                📞 <span>Call Lead</span>
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 60px; color: var(--text-muted);">
                            <div style="font-size: 2rem; margin-bottom: 10px;">📩</div>
                            <p>No inquiries yet for this property.</p>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
